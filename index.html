<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ---------- small inline icons (no external icon library needed) ----------
function Icon({ path, size = 18, className = "" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
      <path d={path} />
    </svg>
  );
}
const ICONS = {
  calendar: "M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z",
  users: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75",
  wallet: "M21 12V7H5a2 2 0 0 1 0-4h14v4 M3 5v14a2 2 0 0 0 2 2h16v-5 M18 12a2 2 0 0 0 0 4h4v-4Z",
  chart: "M3 3v18h18 M18 17V9 M13 17V5 M8 17v-3",
  logout: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9",
  user: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z",
  chevLeft: "M15 18l-6-6 6-6",
  chevRight: "M9 18l6-6-6-6",
  plus: "M12 5v14M5 12h14",
  x: "M18 6 6 18M6 6l12 12",
  pencil: "M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z",
  trash: "M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6",
  clock: "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z M12 6v6l4 2",
  phone: "M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.7a2 2 0 0 1-.4 2.1L8.1 9.6a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 2.1-.4c.9.3 1.8.5 2.7.6a2 2 0 0 1 1.7 2.1Z",
  search: "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM21 21l-4.3-4.3",
  lock: "M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2Z M7 11V7a5 5 0 0 1 10 0v4",
  download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3",
  shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z M9 12l2 2 4-4",
};
function I(name, props) { return <Icon path={ICONS[name]} {...props} />; }

const DOCTOR_COLORS = [
  { dot: "bg-teal-500", chip: "bg-teal-50 text-teal-700 border-teal-200" },
  { dot: "bg-amber-500", chip: "bg-amber-50 text-amber-700 border-amber-200" },
  { dot: "bg-rose-500", chip: "bg-rose-50 text-rose-700 border-rose-200" },
  { dot: "bg-sky-500", chip: "bg-sky-50 text-sky-700 border-sky-200" },
  { dot: "bg-violet-500", chip: "bg-violet-50 text-violet-700 border-violet-200" },
  { dot: "bg-emerald-500", chip: "bg-emerald-50 text-emerald-700 border-emerald-200" },
  { dot: "bg-orange-500", chip: "bg-orange-50 text-orange-700 border-orange-200" },
  { dot: "bg-fuchsia-500", chip: "bg-fuchsia-50 text-fuchsia-700 border-fuchsia-200" },
];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const WEEKDAY_LABELS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function pad(n) { return n < 10 ? `0${n}` : `${n}`; }
function toDateStr(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }
function todayStr() { const t = new Date(); return toDateStr(t.getFullYear(), t.getMonth(), t.getDate()); }
function formatLongDate(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
}
function money(n) { return `EGP ${Number(n || 0).toLocaleString("en-US", { maximumFractionDigits: 2 })}`; }
function colorFor(doctors, doctorId) {
  const idx = doctors.findIndex((d) => d.id === doctorId);
  return DOCTOR_COLORS[(idx < 0 ? 0 : idx) % DOCTOR_COLORS.length];
}
function withId(snapshot) { return snapshot.docs.map((d) => ({ id: d.id, ...d.data() })); }

// ---------- shared UI bits ----------
function Sheet({ title, onClose, children, wide }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/40">
      <div className={`w-full ${wide ? "sm:max-w-lg" : "sm:max-w-md"} bg-white rounded-t-2xl sm:rounded-2xl max-h-[92vh] overflow-y-auto shadow-xl`}>
        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100 sticky top-0 bg-white rounded-t-2xl">
          <h3 className="font-display text-lg text-slate-800">{title}</h3>
          <button onClick={onClose} className="p-1.5 rounded-full hover:bg-slate-100 text-slate-500">{I("x", { size: 20 })}</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return <label className="block mb-4"><span className="block text-xs font-medium text-slate-500 mb-1.5">{label}</span>{children}</label>;
}
const inputCls = "w-full rounded-xl border border-slate-200 px-3.5 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent";

function Logo({ size = 32 }) {
  return (
    <svg viewBox="0 0 40 40" width={size} height={size}>
      <circle cx="20" cy="20" r="19" fill="#0f766e" />
      <path d="M20 6 A14 14 0 0 0 20 34 A11 11 0 0 1 20 6 Z" fill="#f59e0b" opacity="0.9" />
    </svg>
  );
}

// ---------- Login ----------
function LoginScreen() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [resetMsg, setResetMsg] = useState("");

  async function submit(e) {
    e.preventDefault();
    setError(""); setBusy(true);
    try {
      await auth.signInWithEmailAndPassword(email.trim(), password);
    } catch (err) {
      setError("Incorrect email or password.");
    }
    setBusy(false);
  }
  async function forgotPassword() {
    if (!email) { setError("Type your email above first, then tap 'Forgot password'."); return; }
    try {
      await auth.sendPasswordResetEmail(email.trim());
      setResetMsg("Password reset email sent. Check your inbox.");
    } catch (err) {
      setError("Could not send reset email. Check the address and try again.");
    }
  }

  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-5">
      <div className="w-full max-w-sm">
        <div className="flex flex-col items-center mb-8">
          <Logo size={56} />
          <h1 className="font-display text-2xl text-slate-800 mt-3">Al Galaa Clinic</h1>
          <p className="text-sm text-slate-400 mt-1">Staff sign in</p>
        </div>
        <form onSubmit={submit} className="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
          <Field label="Email"><input type="email" className={inputCls} value={email} onChange={(e) => setEmail(e.target.value)} autoFocus /></Field>
          <Field label="Password"><input type="password" className={inputCls} value={password} onChange={(e) => setPassword(e.target.value)} /></Field>
          {error && <p className="text-rose-600 text-sm mb-3">{error}</p>}
          {resetMsg && <p className="text-emerald-600 text-sm mb-3">{resetMsg}</p>}
          <button disabled={busy} type="submit" className="w-full bg-teal-700 hover:bg-teal-800 disabled:opacity-50 text-white rounded-xl py-2.5 text-sm font-medium">
            {busy ? "Signing in…" : "Sign in"}
          </button>
          <button type="button" onClick={forgotPassword} className="w-full text-xs text-slate-400 mt-3 hover:text-slate-600">Forgot password?</button>
        </form>
        <p className="text-center text-[11px] text-slate-300 mt-6">First time? See SETUP-GUIDE.md to create the first admin account.</p>
      </div>
    </div>
  );
}

// ---------- App ----------
function App() {
  const [authLoading, setAuthLoading] = useState(true);
  const [currentUser, setCurrentUser] = useState(null);
  const [doctors, setDoctors] = useState([]);
  const [appointments, setAppointments] = useState([]);
  const [availability, setAvailability] = useState([]);
  const [payments, setPayments] = useState([]);
  const [users, setUsers] = useState([]);
  const [tab, setTab] = useState("calendar");
  const [searchOpen, setSearchOpen] = useState(false);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (fbUser) => {
      if (!fbUser) { setCurrentUser(null); setAuthLoading(false); return; }
      try {
        const profileSnap = await db.collection("users").doc(fbUser.uid).get();
        const profile = profileSnap.exists ? profileSnap.data() : { role: "doctor", name: fbUser.email };
        setCurrentUser({ uid: fbUser.uid, email: fbUser.email, ...profile });
      } catch (e) {
        setCurrentUser({ uid: fbUser.uid, email: fbUser.email, role: "doctor", name: fbUser.email });
      }
      setAuthLoading(false);
    });
    return unsub;
  }, []);

  useEffect(() => {
    if (!currentUser) return;
    const unsubs = [
      db.collection("doctors").onSnapshot((s) => setDoctors(withId(s))),
      db.collection("appointments").onSnapshot((s) => setAppointments(withId(s))),
      db.collection("availability").onSnapshot((s) => setAvailability(withId(s))),
      db.collection("payments").onSnapshot((s) => setPayments(withId(s))),
      db.collection("users").onSnapshot((s) => setUsers(withId(s))),
    ];
    return () => unsubs.forEach((u) => u());
  }, [currentUser]);

  const isAdmin = currentUser?.role === "admin";
  function canEdit(doctorId) { return isAdmin || currentUser?.doctorId === doctorId; }

  if (authLoading) return <div className="min-h-screen bg-slate-50 flex items-center justify-center text-slate-400 text-sm">Loading…</div>;
  if (!currentUser) return <LoginScreen />;

  const tabs = [
    { key: "calendar", label: "Calendar", icon: "calendar" },
    { key: "doctors", label: "Doctors", icon: "users" },
    { key: "payments", label: "Payments", icon: "wallet" },
    { key: "reports", label: "Reports", icon: "chart" },
    { key: "account", label: "Account", icon: "user" },
  ];

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800">
      <div className="bg-white border-b border-slate-100 sticky top-0 z-30">
        <div className="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <Logo size={32} />
            <div>
              <div className="font-display text-base leading-tight text-slate-800">Al Galaa Clinic</div>
              <div className="text-[11px] text-slate-400 leading-tight">{isAdmin ? "Administrator" : currentUser.name}</div>
            </div>
          </div>
          <div className="flex items-center gap-1">
            <button onClick={() => setSearchOpen(true)} className="p-2 rounded-full hover:bg-slate-100 text-slate-500" title="Find patient">{I("search", { size: 19 })}</button>
            <nav className="hidden sm:flex items-center gap-1 ml-2">
              {tabs.map((t) => (
                <button key={t.key} onClick={() => setTab(t.key)}
                  className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium ${tab === t.key ? "bg-teal-50 text-teal-700" : "text-slate-500 hover:bg-slate-50"}`}>
                  {I(t.icon, { size: 16 })} {t.label}
                </button>
              ))}
              <button onClick={() => auth.signOut()} className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium text-rose-600 hover:bg-rose-50 ml-1">
                {I("logout", { size: 16 })} Sign out
              </button>
            </nav>
          </div>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-5 pb-24 sm:pb-8">
        {tab === "calendar" && <CalendarTab doctors={doctors} appointments={appointments} availability={availability} currentUser={currentUser} isAdmin={isAdmin} canEdit={canEdit} />}
        {tab === "doctors" && <DoctorsTab doctors={doctors} users={users} isAdmin={isAdmin} />}
        {tab === "payments" && <PaymentsTab doctors={doctors} payments={payments} currentUser={currentUser} isAdmin={isAdmin} canEdit={canEdit} />}
        {tab === "reports" && <ReportsTab doctors={doctors} appointments={appointments} payments={payments} currentUser={currentUser} isAdmin={isAdmin} />}
        {tab === "account" && <AccountTab currentUser={currentUser} />}
      </div>

      {searchOpen && <PatientSearch doctors={doctors} appointments={appointments} payments={payments} currentUser={currentUser} isAdmin={isAdmin} onClose={() => setSearchOpen(false)} />}

      <div className="sm:hidden fixed bottom-0 inset-x-0 bg-white border-t border-slate-100 flex z-30">
        {tabs.map((t) => (
          <button key={t.key} onClick={() => setTab(t.key)} className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 text-[11px] font-medium ${tab === t.key ? "text-teal-700" : "text-slate-400"}`}>
            {I(t.icon, { size: 19 })}{t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

// ---------- Calendar ----------
function CalendarTab({ doctors, appointments, availability, currentUser, isAdmin, canEdit }) {
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [showApptForm, setShowApptForm] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const cells = useMemo(() => {
    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const arr = [];
    for (let i = 0; i < firstDay; i++) arr.push(null);
    for (let d = 1; d <= daysInMonth; d++) arr.push(d);
    return arr;
  }, [viewYear, viewMonth]);

  function apptsFor(dateStr) { return appointments.filter((a) => a.date === dateStr).sort((a, b) => (a.time || "").localeCompare(b.time || "")); }
  function presentDoctorsFor(dateStr) { return doctors.filter((doc) => availability.find((av) => av.date === dateStr && av.doctorId === doc.id && av.status === "present")); }

  function changeMonth(delta) {
    let m = viewMonth + delta, y = viewYear;
    if (m < 0) { m = 11; y -= 1; } else if (m > 11) { m = 0; y += 1; }
    setViewMonth(m); setViewYear(y);
  }

  async function setAvailabilityStatus(doctorId, status) {
    const existing = availability.find((av) => av.date === selectedDate && av.doctorId === doctorId);
    if (existing) await db.collection("availability").doc(existing.id).update({ status });
    else await db.collection("availability").add({ date: selectedDate, doctorId, status });
  }
  async function saveAppointment(data) {
    if (data.id) { const { id, ...rest } = data; await db.collection("appointments").doc(id).update(rest); }
    else await db.collection("appointments").add(data);
    setShowApptForm(null);
  }
  async function deleteAppointment(id) { await db.collection("appointments").doc(id).delete(); setConfirmDelete(null); }

  const dayAppts = apptsFor(selectedDate);

  return (
    <div className="grid lg:grid-cols-3 gap-5">
      <div className="lg:col-span-2 bg-white rounded-2xl border border-slate-100 p-4 sm:p-5">
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-display text-lg text-slate-800">{MONTH_NAMES[viewMonth]} {viewYear}</h2>
          <div className="flex items-center gap-1">
            <button onClick={() => { setViewMonth(today.getMonth()); setViewYear(today.getFullYear()); setSelectedDate(todayStr()); }} className="text-xs font-medium text-teal-700 px-2.5 py-1.5 rounded-lg hover:bg-teal-50 mr-1">Today</button>
            <button onClick={() => changeMonth(-1)} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">{I("chevLeft", { size: 18 })}</button>
            <button onClick={() => changeMonth(1)} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">{I("chevRight", { size: 18 })}</button>
          </div>
        </div>
        <div className="grid grid-cols-7 gap-1 mb-1">{WEEKDAY_LABELS.map((w) => <div key={w} className="text-center text-[11px] font-medium text-slate-400 py-1">{w}</div>)}</div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d, i) => {
            if (!d) return <div key={i} />;
            const dateStr = toDateStr(viewYear, viewMonth, d);
            const isSelected = dateStr === selectedDate;
            const isToday = dateStr === todayStr();
            const present = presentDoctorsFor(dateStr);
            const apptCount = appointments.filter((a) => a.date === dateStr).length;
            return (
              <button key={i} onClick={() => setSelectedDate(dateStr)}
                className={`aspect-square rounded-xl p-1.5 flex flex-col items-center justify-start border ${isSelected ? "border-teal-600 bg-teal-50" : isToday ? "border-amber-300 bg-amber-50" : "border-transparent hover:bg-slate-50"}`}>
                <span className={`text-xs font-medium ${isSelected ? "text-teal-800" : "text-slate-600"}`}>{d}</span>
                <div className="flex gap-0.5 mt-1 flex-wrap justify-center">
                  {present.slice(0, 4).map((doc) => <span key={doc.id} className={`w-1.5 h-1.5 rounded-full ${colorFor(doctors, doc.id).dot}`} />)}
                </div>
                {apptCount > 0 && <span className="text-[9px] text-slate-400 mt-0.5">{apptCount} visit{apptCount > 1 ? "s" : ""}</span>}
              </button>
            );
          })}
        </div>
        <div className="flex flex-wrap gap-3 mt-4 pt-4 border-t border-slate-100">
          {doctors.map((doc) => <div key={doc.id} className="flex items-center gap-1.5 text-xs text-slate-500"><span className={`w-2 h-2 rounded-full ${colorFor(doctors, doc.id).dot}`} /> {doc.name}</div>)}
          {doctors.length === 0 && <p className="text-xs text-slate-400">Add doctors from the Doctors tab to see them on the calendar.</p>}
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-slate-100 p-4 sm:p-5 h-fit lg:sticky lg:top-20">
        <h3 className="font-display text-base text-slate-800 mb-1">{formatLongDate(selectedDate)}</h3>
        <p className="text-xs text-slate-400 mb-4">Mark who's in today and manage visits.</p>

        <div className="mb-5">
          <div className="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">Doctors today</div>
          {doctors.length === 0 && <p className="text-sm text-slate-400">No doctors added yet.</p>}
          <div className="space-y-2">
            {doctors.map((doc) => {
              const rec = availability.find((av) => av.date === selectedDate && av.doctorId === doc.id);
              const status = rec?.status || "unset";
              const editable = canEdit(doc.id);
              return (
                <div key={doc.id} className="flex items-center justify-between gap-2">
                  <div className="flex items-center gap-2 min-w-0"><span className={`w-2 h-2 rounded-full flex-shrink-0 ${colorFor(doctors, doc.id).dot}`} /><span className="text-sm text-slate-700 truncate">{doc.name}</span></div>
                  <div className="flex gap-1 flex-shrink-0">
                    <button disabled={!editable} onClick={() => setAvailabilityStatus(doc.id, "present")} className={`text-[11px] px-2 py-1 rounded-md font-medium border ${status === "present" ? "bg-emerald-500 text-white border-emerald-500" : "border-slate-200 text-slate-400"} ${!editable ? "opacity-50" : "hover:border-emerald-400"}`}>In</button>
                    <button disabled={!editable} onClick={() => setAvailabilityStatus(doc.id, "off")} className={`text-[11px] px-2 py-1 rounded-md font-medium border ${status === "off" ? "bg-rose-500 text-white border-rose-500" : "border-slate-200 text-slate-400"} ${!editable ? "opacity-50" : "hover:border-rose-400"}`}>Off</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Appointments</div>
            <button onClick={() => setShowApptForm({ date: selectedDate, doctorId: isAdmin ? "" : currentUser.doctorId, time: "", patientName: "", phone: "", status: "scheduled", notes: "" })} className="flex items-center gap-1 text-xs font-medium text-teal-700 hover:bg-teal-50 px-2 py-1 rounded-lg">{I("plus", { size: 14 })} Add</button>
          </div>

// ---------- Doctors ----------
function DoctorsTab({ doctors, users, isAdmin }) {
  const [showForm, setShowForm] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [busy, setBusy] = useState(false);
  const [formError, setFormError] = useState("");

  async function saveDoctor(form) {
    setFormError(""); setBusy(true);
    try {
      if (form.id) {
        await db.collection("doctors").doc(form.id).update({ name: form.name, specialty: form.specialty, phone: form.phone });
        const u = users.find((x) => x.doctorId === form.id);
        if (u) await db.collection("users").doc(u.id).update({ name: form.name });
      } else {
        const docRef = await db.collection("doctors").add({ name: form.name, specialty: form.specialty, phone: form.phone });
        const secondaryApp = firebase.initializeApp(firebaseConfig, "Secondary" + Date.now());
        try {
          const cred = await secondaryApp.auth().createUserWithEmailAndPassword(form.email.trim(), form.password);
          const uid = cred.user.uid;
          await secondaryApp.auth().signOut();
          await db.collection("users").doc(uid).set({ role: "doctor", doctorId: docRef.id, name: form.name, email: form.email.trim() });
        } finally {
          await secondaryApp.delete();
        }
      }
      setShowForm(null);
    } catch (e) {
      setFormError(e.message || "Could not save doctor.");
    }
    setBusy(false);
  }
  async function deleteDoctor(id) {
    await db.collection("doctors").doc(id).delete();
    const u = users.find((x) => x.doctorId === id);
    if (u) await db.collection("users").doc(u.id).delete();
    setConfirmDelete(null);
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-display text-lg text-slate-800">Doctors</h2>
        {isAdmin && <button onClick={() => setShowForm({})} className="flex items-center gap-1.5 bg-teal-700 hover:bg-teal-800 text-white text-sm font-medium px-3.5 py-2 rounded-xl">{I("plus", { size: 16 })} Add doctor</button>}
      </div>
      {doctors.length === 0 && <div className="bg-white rounded-2xl border border-slate-100 p-8 text-center text-slate-400 text-sm">No doctors yet. {isAdmin ? "Add your first doctor to get started." : "Ask the administrator to add doctors."}</div>}
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        {doctors.map((d) => {
          const c = colorFor(doctors, d.id);
          const u = users.find((x) => x.doctorId === d.id);
          return (
            <div key={d.id} className="bg-white rounded-2xl border border-slate-100 p-4">
              <div className="flex items-start justify-between">
                <div className="flex items-center gap-2.5">
                  <span className={`w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-semibold ${c.dot}`}>{d.name?.[0]?.toUpperCase() || "?"}</span>
                  <div><div className="text-sm font-semibold text-slate-800">{d.name}</div><div className="text-xs text-slate-400">{d.specialty || "General"}</div></div>
                </div>
                {isAdmin && (
                  <div className="flex gap-1">
                    <button onClick={() => setShowForm({ ...d })} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">{I("pencil", { size: 14 })}</button>
                    <button onClick={() => setConfirmDelete(d.id)} className="p-1.5 rounded-lg hover:bg-slate-100 text-rose-500">{I("trash", { size: 14 })}</button>
                  </div>
                )}
              </div>
              <div className="mt-3 text-xs text-slate-500 space-y-0.5">
                {d.phone && <div>{d.phone}</div>}
                {u && isAdmin && <div className="text-slate-400">Login: {u.email}</div>}
              </div>
            </div>
          );
        })}
      </div>
      {showForm && <DoctorForm data={showForm} busy={busy} error={formError} onCancel={() => setShowForm(null)} onSave={saveDoctor} />}
      {confirmDelete && (
        <Sheet title="Remove doctor?" onClose={() => setConfirmDelete(null)}>
          <p className="text-sm text-slate-500 mb-5">This removes the doctor record and their login profile. Their existing appointments and payments remain on record. (Their sign-in account itself must also be deleted from the Firebase console under Authentication.)</p>
          <div className="flex gap-2">
            <button onClick={() => setConfirmDelete(null)} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600">Cancel</button>
            <button onClick={() => deleteDoctor(confirmDelete)} className="flex-1 py-2.5 rounded-xl bg-rose-600 text-white text-sm font-medium">Remove</button>
          </div>
        </Sheet>
      )}
    </div>
  );
}

function PaymentsTab({ doctors, payments, currentUser, isAdmin, canEdit }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());

  const ym = `${year}-${pad(month + 1)}`;
  const visible = payments.filter((p) => {
    if (!p.date.startsWith(ym)) return false;
    if (!isAdmin && p.doctorId !== currentUser.doctorId) return false;
    if (isAdmin && doctorFilter !== "all" && p.doctorId !== doctorFilter) return false;
    return true;
  }).sort((a, b) => b.date.localeCompare(a.date));
  const total = visible.reduce((s, p) => s + Number(p.amount || 0), 0);

  async function save(form) {
    if (form.id) { const { id, ...rest } = form; await db.collection("payments").doc(id).update(rest); }

  return (

        {isAdmin && <select className="rounded-xl border border-slate-200 px-3 py-2 text-sm" value={doctorFilter} onChange={(e) => setDoctorFilter(e.target.value)}><option value="all">All doctors</option>{doctors.map((d) => <option key={d.id} value={d.id}>{d.name}</option>)}</select>}

      <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3 bg-slate-50 border-b border-slate-100">

        <div className="divide-y divide-slate-100">
          {visible.map((p) => {
            const doc = doctors.find((d) => d.id === p.doctorId);

            return (
              <div key={p.id} className="flex items-center justify-between px-4 py-3 gap-2">
                <div className="min-w-0"><div className="text-sm font-medium text-slate-800 truncate">{p.patientName}</div><div className="text-xs text-slate-400">{p.date}{doc ? ` · ${doc.name}` : ""}{p.notes ? ` · ${p.notes}` : ""}</div></div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  <span className="text-sm font-semibold text-slate-700">{money(p.amount)}</span>

// ---------- Reports ----------
function ReportsTab({ doctors, appointments, payments, currentUser, isAdmin }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const ym = `${year}-${pad(month + 1)}`;

  function statsFor(doctorId) {
    const apps = appointments.filter((a) => a.date.startsWith(ym) && a.doctorId === doctorId);
    const pays = payments.filter((p) => p.date.startsWith(ym) && p.doctorId === doctorId);
    return { totalVisits: apps.length, completedVisits: apps.filter((a) => a.status === "done").length, totalPayments: pays.reduce((s, p) => s + Number(p.amount || 0), 0) };
  }
  function downloadCsv() {
    const rows = [["Doctor", "Total Visits", "Completed Visits", "Total Payments (EGP)"]];
    let gv = 0, gc = 0, gt = 0;
    doctors.forEach((d) => { const s = statsFor(d.id); rows.push([d.name, s.totalVisits, s.completedVisits, s.totalPayments]); gv += s.totalVisits; gc += s.completedVisits; gt += s.totalPayments; });
    rows.push(["TOTAL", gv, gc, gt]);
    const csv = rows.map((r) => r.join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `al-galaa-clinic-report-${ym}.csv`; a.click(); URL.revokeObjectURL(url);
  }

  return (
    <div>
      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <h2 className="font-display text-lg text-slate-800">Monthly report</h2>
        <div className="flex gap-2">
          <select className="rounded-xl border border-slate-200 px-3 py-2 text-sm" value={month} onChange={(e) => setMonth(Number(e.target.value))}>{MONTH_NAMES.map((m, i) => <option key={m} value={i}>{m}</option>)}</select>
          <select className="rounded-xl border border-slate-200 px-3 py-2 text-sm" value={year} onChange={(e) => setYear(Number(e.target.value))}>{[year - 1, year, year + 1].map((y) => <option key={y} value={y}>{y}</option>)}</select>
          {isAdmin && <button onClick={downloadCsv} className="flex items-center gap-1.5 border border-slate-200 text-slate-600 text-sm font-medium px-3 py-2 rounded-xl hover:bg-slate-50">{I("download", { size: 15 })} CSV</button>}
        </div>
      </div>
      {isAdmin ? (
        <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
          <table className="w-full text-sm">
            <thead><tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide"><th className="text-left font-semibold px-4 py-3">Doctor</th><th className="text-right font-semibold px-4 py-3">Visits</th><th className="text-right font-semibold px-4 py-3">Completed</th><th className="text-right font-semibold px-4 py-3">Payments</th></tr></thead>
            <tbody className="divide-y divide-slate-100">
              {doctors.map((d) => { const s = statsFor(d.id); return (
                <tr key={d.id}>
                  <td className="px-4 py-3 flex items-center gap-2"><span className={`w-2 h-2 rounded-full ${colorFor(doctors, d.id).dot}`} /> {d.name}</td>
                  <td className="px-4 py-3 text-right text-slate-600">{s.totalVisits}</td>
                  <td className="px-4 py-3 text-right text-slate-600">{s.completedVisits}</td>
                  <td className="px-4 py-3 text-right font-medium text-slate-800">{money(s.totalPayments)}</td>
                </tr>
              );})}
              {doctors.length === 0 && <tr><td colSpan={4} className="px-4 py-6 text-center text-slate-400">No doctors yet.</td></tr>}
            </tbody>
            {doctors.length > 0 && (
              <tfoot><tr className="bg-teal-50/60 font-semibold text-teal-800">
                <td className="px-4 py-3">Clinic total</td>
                <td className="px-4 py-3 text-right">{doctors.reduce((s, d) => s + statsFor(d.id).totalVisits, 0)}</td>
                <td className="px-4 py-3 text-right">{doctors.reduce((s, d) => s + statsFor(d.id).completedVisits, 0)}</td>
                <td className="px-4 py-3 text-right">{money(doctors.reduce((s, d) => s + statsFor(d.id).totalPayments, 0))}</td>
              </tr></tfoot>
            )}
          </table>
        </div>
      ) : (
        <div className="grid sm:grid-cols-3 gap-3">
          {(() => { const s = statsFor(currentUser.doctorId); return (<>
            <StatCard label="Total visits" value={s.totalVisits} />
            <StatCard label="Completed patients" value={s.completedVisits} />
            <StatCard label="Total payments" value={money(s.totalPayments)} />
          </>); })()}
        </div>
      )}
    </div>
  );
}
function StatCard({ label, value }) {
  return <div className="bg-white rounded-2xl border border-slate-100 p-5"><div className="text-xs text-slate-400 mb-1">{label}</div><div className="font-display text-2xl text-slate-800">{value}</div></div>;
}

// ---------- Account ----------
function AccountTab({ currentUser }) {
  const [current, setCurrent] = useState("");
  const [next, setNext] = useState("");
  const [msg, setMsg] = useState("");
  const [error, setError] = useState("");

  async function changePassword() {
    setMsg(""); setError("");
    if (!next || next.length < 6) { setError("New password must be at least 6 characters."); return; }
    try {
      const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, current);
      await auth.currentUser.reauthenticateWithCredential(cred);
      await auth.currentUser.updatePassword(next);
      setCurrent(""); setNext(""); setMsg("Password updated.");
    } catch (e) {
      setError("Current password is incorrect, or the update failed. Try again.");
    }
  }

  return (
    <div className="max-w-md">
      <h2 className="font-display text-lg text-slate-800 mb-4">Account</h2>
      <div className="bg-white rounded-2xl border border-slate-100 p-5 mb-4">
        <div className="flex items-center gap-3">
          <span className="w-10 h-10 rounded-full bg-teal-600 text-white flex items-center justify-center font-semibold">{currentUser.name?.[0] || "U"}</span>
          <div><div className="text-sm font-semibold text-slate-800">{currentUser.name}</div><div className="text-xs text-slate-400 flex items-center gap-1">{currentUser.role === "admin" && I("shield", { size: 12 })} {currentUser.role === "admin" ? "Administrator" : "Doctor"} · {currentUser.email}</div></div>
        </div>
      </div>
      <div className="bg-white rounded-2xl border border-slate-100 p-5">
        <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3 flex items-center gap-1.5">{I("lock", { size: 13 })} Change password</div>
        <Field label="Current password"><input type="password" className={inputCls} value={current} onChange={(e) => setCurrent(e.target.value)} /></Field>
        <Field label="New password"><input type="password" className={inputCls} value={next} onChange={(e) => setNext(e.target.value)} /></Field>
        {error && <p className="text-xs text-rose-600 mb-3">{error}</p>}
        {msg && <p className="text-xs text-emerald-600 mb-3">{msg}</p>}
        <button onClick={changePassword} className="w-full bg-teal-700 hover:bg-teal-800 text-white rounded-xl py-2.5 text-sm font-medium">Update password</button>
      </div>
      <button onClick={() => auth.signOut()} className="w-full flex items-center justify-center gap-2 text-rose-600 font-medium text-sm mt-4 py-2.5">{I("logout", { size: 16 })} Sign out</button>
    </div>
  );
}

// ---------- Search ----------
function PatientSearch({ doctors, appointments, payments, currentUser, isAdmin, onClose }) {
  const [q, setQ] = useState("");
  const query = q.trim().toLowerCase();
  const apptResults = query.length < 2 ? [] : appointments.filter((a) => a.patientName?.toLowerCase().includes(query) && (isAdmin || a.doctorId === currentUser.doctorId));
  const payResults = query.length < 2 ? [] : payments.filter((p) => p.patientName?.toLowerCase().includes(query) && (isAdmin || p.doctorId === currentUser.doctorId));
  return (
    <Sheet title="Find patient" onClose={onClose} wide>
      <div className="relative mb-4">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">{I("search", { size: 16 })}</span>
        <input autoFocus className={`${inputCls} pl-9`} placeholder="Type a patient name…" value={q} onChange={(e) => setQ(e.target.value)} />
      </div>
      {query.length >= 2 && apptResults.length === 0 && payResults.length === 0 && <p className="text-sm text-slate-400 text-center py-4">No matching records found.</p>}
      {apptResults.length > 0 && (
        <div className="mb-4">
          <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Appointments</div>
          <div className="space-y-1.5">{apptResults.map((a) => { const doc = doctors.find((d) => d.id === a.doctorId); return (
            <div key={a.id} className="text-sm border border-slate-100 rounded-lg px-3 py-2 flex justify-between"><span>{a.patientName} <span className="text-slate-400">· {doc?.name || "—"}</span></span><span className="text-slate-400">{a.date}</span></div>
          );})}</div>
        </div>
      )}
      {payResults.length > 0 && (
        <div>
          <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Payments</div>
          <div className="space-y-1.5">{payResults.map((p) => { const doc = doctors.find((d) => d.id === p.doctorId); return (
            <div key={p.id} className="text-sm border border-slate-100 rounded-lg px-3 py-2 flex justify-between"><span>{p.patientName} <span className="text-slate-400">· {doc?.name || "—"}</span></span><span className="font-medium">{money(p.amount)}</span></div>
          );})}</div>
        </div>
      )}
    </Sheet>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
