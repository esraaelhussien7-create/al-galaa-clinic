  { dot: "bg-fuchsia-500", chip: "bg-fuchsia-50 text-fuchsia-700 border-fuchsia-200" },
];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const WEEKDAY_LABELS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function pad(n) { return n < 10 ? `0${n}` : `${n}`; }
function toDateStr(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }
function todayStr() { const t = new Date(); return toDateStr(t.getFullYear(), t.getMonth(), t.getDate()); }
function formatLongDate(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
}
function money(n) { return `EGP ${Number(n || 0).toLocaleString("en-US", { maximumFractionDigits: 2 })}`; }
function colorFor(doctors, doctorId) {
  const idx = doctors.findIndex((d) => d.id === doctorId);
  return DOCTOR_COLORS[(idx < 0 ? 0 : idx) % DOCTOR_COLORS.length];
}
function withId(snapshot) { return snapshot.docs.map((d) => ({ id: d.id, ...d.data() })); }

// ---------- shared UI bits ----------
function Sheet({ title, onClose, children, wide }) {

    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/40">

// ---------- Login ----------
function LoginScreen() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [resetMsg, setResetMsg] = useState("");

  async function submit(e) {
    e.preventDefault();
    setError(""); setBusy(true);
    try {
      await auth.signInWithEmailAndPassword(email.trim(), password);
    } catch (err) {
      setError("Incorrect email or password.");
    }
    setBusy(false);
  }
  async function forgotPassword() {
    if (!email) { setError("Type your email above first, then tap 'Forgot password'."); return; }
    try {
      await auth.sendPasswordResetEmail(email.trim());
      setResetMsg("Password reset email sent. Check your inbox.");
    } catch (err) {
      setError("Could not send reset email. Check the address and try again.");
    }
  }

  return (
    <div className="min-h-screen bg-sky-50 flex items-center justify-center p-5">
      <div className="w-full max-w-sm">
        <div className="flex flex-col items-center mb-8">
          <Logo size={56} />
          <h1 className="font-display text-2xl text-slate-800 mt-3">Al Galaa Clinic</h1>
          <p className="text-sm text-slate-500 mt-1">Staff sign in</p>
        </div>
        <form onSubmit={submit} className="bg-white rounded-2xl border border-amber-200 shadow-sm p-6">
          <Field label="Email"><input type="email" className={inputCls} value={email} onChange={(e) => setEmail(e.target.value)} autoFocus /></Field>
          <Field label="Password"><input type="password" className={inputCls} value={password} onChange={(e) => setPassword(e.target.value)} /></Field>
          {error && <p className="text-rose-600 text-sm mb-3">{error}</p>}
          {resetMsg && <p className="text-emerald-600 text-sm mb-3">{resetMsg}</p>}
          <button disabled={busy} type="submit" className={`w-full ${btnPrimary}`}>{busy ? "Signing in…" : "Sign in"}</button>
          <button type="button" onClick={forgotPassword} className="w-full text-xs text-slate-500 mt-3 hover:text-slate-600">Forgot password?</button>
        </form>
        <p className="text-center text-[11px] text-slate-600 mt-6">First time? See SETUP-GUIDE.md to create the first admin account.</p>
      </div>
    </div>
  );
}

// ---------- App ----------
function App() {
  const [authLoading, setAuthLoading] = useState(true);
  const [currentUser, setCurrentUser] = useState(null);
  const [doctors, setDoctors] = useState([]);
  const [appointments, setAppointments] = useState([]);
  const [availability, setAvailability] = useState([]);
  const [payments, setPayments] = useState([]);
  const [users, setUsers] = useState([]);
  const [procedures, setProcedures] = useState([]);
  const [patients, setPatients] = useState([]);
  const [seeded, setSeeded] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [searchOpen, setSearchOpen] = useState(false);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (fbUser) => {
      if (!fbUser) { setCurrentUser(null); setAuthLoading(false); return; }
      try {
        const profileSnap = await db.collection("users").doc(fbUser.uid).get();
        const profile = profileSnap.exists ? profileSnap.data() : { role: "doctor", name: fbUser.email };
        setCurrentUser({ uid: fbUser.uid, email: fbUser.email, ...profile });
      } catch (e) {
        setCurrentUser({ uid: fbUser.uid, email: fbUser.email, role: "doctor", name: fbUser.email });
      }
      setAuthLoading(false);
    });
    return unsub;
  }, []);

  useEffect(() => {
    if (!currentUser) return;
    const unsubs = [
      db.collection("doctors").onSnapshot((s) => setDoctors(withId(s))),
      db.collection("appointments").onSnapshot((s) => setAppointments(withId(s))),
      db.collection("availability").onSnapshot((s) => setAvailability(withId(s))),
      db.collection("payments").onSnapshot((s) => setPayments(withId(s))),
      db.collection("users").onSnapshot((s) => setUsers(withId(s))),
      db.collection("procedures").onSnapshot((s) => setProcedures(withId(s))),
      db.collection("patients").onSnapshot((s) => setPatients(withId(s))),
    ];
    return () => unsubs.forEach((u) => u());
  }, [currentUser]);

  // seed the default dental procedure catalog once, if an admin is signed in and it's empty
  useEffect(() => {
    if (!currentUser || currentUser.role !== "admin" || seeded) return;
    (async () => {
      const snap = await db.collection("procedures").limit(1).get();
      if (snap.empty) {
        const batch = db.batch();
        DEFAULT_PROCEDURES.forEach(([specialty, name]) => {
          const ref = db.collection("procedures").doc();
          batch.set(ref, { specialty, name });
        });
        await batch.commit();
      }
      setSeeded(true);
    })();
  }, [currentUser, seeded]);

  const isAdmin = currentUser?.role === "admin";
  function canEdit(doctorId) { return isAdmin || currentUser?.doctorId === doctorId; }

  if (authLoading) return <div className="min-h-screen bg-sky-50 flex items-center justify-center text-slate-500 text-sm">Loading…</div>;
  if (!currentUser) return <LoginScreen />;

  const tabs = [
    { key: "dashboard", label: "Dashboard", icon: "dashboard" },
    { key: "calendar", label: "Calendar", icon: "calendar" },
    { key: "patients", label: "Patients", icon: "patient" },
    { key: "doctors", label: "Doctors", icon: "users" },
    { key: "procedures", label: "Procedures", icon: "procedure" },
    { key: "payments", label: "Payments", icon: "wallet" },
    { key: "reports", label: "Reports", icon: "chart" },
    { key: "account", label: "Account", icon: "user" },
  ];

  return (
    <div className="min-h-screen bg-sky-50 text-slate-800">
      <div className="bg-white border-b border-amber-200 sticky top-0 z-30">
        <div className="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <Logo size={32} />
            <div>
              <div className="font-display text-base leading-tight text-slate-800">Al Galaa Clinic</div>
              <div className="text-[11px] text-slate-500 leading-tight">{isAdmin ? "Administrator" : currentUser.name} · role: {String(currentUser.role)}</div>
            </div>
          </div>
          <div className="flex items-center gap-1">
            <button onClick={() => setSearchOpen(true)} className="p-2 rounded-full hover:bg-sky-50 text-slate-400" title="Find patient">{I("search", { size: 19 })}</button>
            <nav className="hidden lg:flex items-center gap-1 ml-2">
              {tabs.map((t) => (
                <button key={t.key} onClick={() => setTab(t.key)}
                  className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium ${tab === t.key ? "bg-amber-50 text-amber-600" : "text-slate-400 hover:bg-sky-50"}`}>
                  {I(t.icon, { size: 16 })} {t.label}
                </button>
              ))}
              <button onClick={() => auth.signOut()} className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium text-rose-600 hover:bg-rose-500/10 ml-1">
                {I("logout", { size: 16 })} Sign out
              </button>
            </nav>
          </div>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-5 pb-24 lg:pb-8">
        {tab === "dashboard" && <DashboardTab doctors={doctors} appointments={appointments} availability={availability} payments={payments} patients={patients} currentUser={currentUser} isAdmin={isAdmin} onNavigate={setTab} />}
        {tab === "calendar" && <CalendarTab doctors={doctors} appointments={appointments} availability={availability} procedures={procedures} patients={patients} currentUser={currentUser} isAdmin={isAdmin} canEdit={canEdit} />}
        {tab === "patients" && <PatientsTab patients={patients} appointments={appointments} isAdmin={isAdmin} />}
        {tab === "doctors" && <DoctorsTab doctors={doctors} users={users} isAdmin={isAdmin} />}
        {tab === "procedures" && <ProceduresTab procedures={procedures} isAdmin={isAdmin} />}
        {tab === "payments" && <PaymentsTab doctors={doctors} payments={payments} patients={patients} currentUser={currentUser} isAdmin={isAdmin} canEdit={canEdit} />}
        {tab === "reports" && <ReportsTab doctors={doctors} appointments={appointments} payments={payments} procedures={procedures} currentUser={currentUser} isAdmin={isAdmin} />}
        {tab === "account" && <AccountTab currentUser={currentUser} />}
      </div>

      {searchOpen && <PatientSearch doctors={doctors} appointments={appointments} payments={payments} currentUser={currentUser} isAdmin={isAdmin} onClose={() => setSearchOpen(false)} />}

      <div className="lg:hidden fixed bottom-0 inset-x-0 bg-white border-t border-amber-200 flex z-30 overflow-x-auto">
        {tabs.map((t) => (
          <button key={t.key} onClick={() => setTab(t.key)} className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 text-[10px] font-medium min-w-[52px] ${tab === t.key ? "text-amber-600" : "text-slate-500"}`}>
            {I(t.icon, { size: 17 })}{t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

// ---------- Dashboard ----------
function DashboardTab({ doctors, appointments, availability, payments, patients, currentUser, isAdmin, onNavigate }) {
  const t = todayStr();
  const now = new Date();
  const ym = `${now.getFullYear()}-${pad(now.getMonth() + 1)}`;

  const scopeDoctors = doctors;
  const todaysAppts = appointments.filter((a) => a.date === t).sort((a, b) => (a.time || "").localeCompare(b.time || ""));
  const presentToday = doctors.filter((doc) => availability.find((av) => av.date === t && av.doctorId === doc.id && av.status === "present"));
  const monthPayments = payments.filter((p) => p.date.startsWith(ym) && (isAdmin || p.doctorId === currentUser.doctorId));
  const monthTotal = monthPayments.reduce((s, p) => s + Number(p.amount || 0), 0);

  return (
    <div>
      <div className="mb-5">
        <h2 className="font-display text-xl text-slate-800">Welcome, {currentUser.name}</h2>
        <p className="text-sm text-slate-500">{formatLongDate(t)}</p>
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
        <button onClick={() => onNavigate("calendar")} className="text-left bg-white rounded-2xl border border-sky-100 p-4 hover:border-amber-500/40">
          <div className="text-xs text-slate-500 mb-1">Doctors in today</div>
          <div className="font-display text-2xl text-slate-800">{presentToday.length}<span className="text-sm text-slate-500">/{scopeDoctors.length || doctors.length}</span></div>
        </button>
        <button onClick={() => onNavigate("calendar")} className="text-left bg-white rounded-2xl border border-sky-100 p-4 hover:border-amber-500/40">
          <div className="text-xs text-slate-500 mb-1">Today's appointments</div>
          <div className="font-display text-2xl text-slate-800">{todaysAppts.length}</div>
        </button>
        <button onClick={() => onNavigate("patients")} className="text-left bg-white rounded-2xl border border-sky-100 p-4 hover:border-amber-500/40">
          <div className="text-xs text-slate-500 mb-1">Total patients</div>
          <div className="font-display text-2xl text-slate-800">{patients.length}</div>
        </button>
        <button onClick={() => onNavigate("payments")} className="text-left bg-white rounded-2xl border border-sky-100 p-4 hover:border-amber-500/40">
          <div className="text-xs text-slate-500 mb-1">This month's revenue</div>
          <div className="font-display text-2xl text-amber-700">{money(monthTotal)}</div>
        </button>
      </div>

      <div className="grid lg:grid-cols-2 gap-5">
        <div className="bg-white rounded-2xl border border-sky-100 p-5">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-display text-base text-slate-800">Today's schedule</h3>
            <button onClick={() => onNavigate("calendar")} className="text-xs text-amber-600 hover:underline">Open calendar →</button>
          </div>
          {todaysAppts.length === 0 && <p className="text-sm text-slate-500">No appointments scheduled for today.</p>}
          <div className="space-y-2">
            {todaysAppts.slice(0, 6).map((a) => {
              const doc = doctors.find((d) => d.id === a.doctorId);
              const statusPill = { scheduled: "bg-sky-50 text-sky-700", done: "bg-emerald-50 text-emerald-700", cancelled: "bg-rose-50 text-rose-700" }[a.status] || "bg-sky-50 text-slate-400";
              return (
                <div key={a.id} className="flex items-center justify-between text-sm border-b border-sky-100 last:border-0 pb-2 last:pb-0">
                  <div className="flex items-center gap-2 min-w-0">
                    <span className="text-slate-500 text-xs w-12 flex-shrink-0">{a.time || "—"}</span>
                    <span className="text-slate-700 truncate">{a.patientName}</span>
                    <span className="text-slate-500 text-xs truncate">· {doc?.name || "—"}</span>
                  </div>
                  <span className={`px-1.5 py-0.5 rounded-full text-[11px] flex-shrink-0 ${statusPill}`}>{a.status}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div className="bg-white rounded-2xl border border-sky-100 p-5">
          <h3 className="font-display text-base text-slate-800 mb-3">Doctors in today</h3>
          {doctors.length === 0 && <p className="text-sm text-slate-500">No doctors added yet.</p>}
          <div className="space-y-2">
            {doctors.map((doc) => {
              const rec = availability.find((av) => av.date === t && av.doctorId === doc.id);
              const status = rec?.status || "unset";
              return (
                <div key={doc.id} className="flex items-center justify-between text-sm">
                  <div className="flex items-center gap-2"><span className={`w-2 h-2 rounded-full ${colorFor(doctors, doc.id).dot}`} /><span className="text-slate-700">{doc.name}</span></div>
                  <span className={`text-xs px-2 py-0.5 rounded-full ${status === "present" ? "bg-emerald-50 text-emerald-700" : status === "off" ? "bg-rose-50 text-rose-700" : "bg-sky-50 text-slate-500"}`}>
                    {status === "present" ? "In" : status === "off" ? "Off" : "Not set"}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- Patients registry ----------
function PatientsTab({ patients, appointments, isAdmin }) {
  const [q, setQ] = useState("");
  const [showForm, setShowForm] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const query = q.trim().toLowerCase();
  const visible = patients.filter((p) => !query || p.name?.toLowerCase().includes(query) || p.phone?.includes(query)).sort((a, b) => (a.name || "").localeCompare(b.name || ""));

  async function save(form) {
    if (form.id) { const { id, ...rest } = form; await db.collection("patients").doc(id).update(rest); }
    else await db.collection("patients").add({ ...form, createdAt: new Date().toISOString() });
    setShowForm(null);
  }
  async function del(id) { await db.collection("patients").doc(id).delete(); setConfirmDelete(null); }

  return (
    <div>
      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <h2 className="font-display text-lg text-slate-800">Patients</h2>
        <button onClick={() => setShowForm({ name: "", phone: "", age: "", gender: "", notes: "" })} className="flex items-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-black text-sm font-semibold px-3.5 py-2 rounded-xl">{I("plus", { size: 16 })} Add patient</button>
      </div>
      <div className="relative mb-4 max-w-sm">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">{I("search", { size: 16 })}</span>
        <input className={`${inputCls} pl-9`} placeholder="Search by name or phone…" value={q} onChange={(e) => setQ(e.target.value)} />
      </div>
      {visible.length === 0 && <div className="bg-white rounded-2xl border border-sky-100 p-8 text-center text-slate-500 text-sm">{patients.length === 0 ? "No patients registered yet." : "No matching patients."}</div>}
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        {visible.map((p) => {
          const visitCount = appointments.filter((a) => a.patientName?.toLowerCase() === p.name?.toLowerCase()).length;
          return (
            <div key={p.id} className="bg-white rounded-2xl border border-sky-100 p-4">
              <div className="flex items-start justify-between">
                <div className="flex items-center gap-2.5 min-w-0">
                  <span className="w-9 h-9 rounded-full bg-amber-500 text-black flex items-center justify-center text-sm font-semibold flex-shrink-0">{p.name?.[0]?.toUpperCase() || "?"}</span>
                  <div className="min-w-0"><div className="text-sm font-semibold text-slate-800 truncate">{p.name}</div><div className="text-xs text-slate-500">{[p.age && `${p.age}y`, p.gender].filter(Boolean).join(" · ") || "—"}</div></div>
                </div>
                <div className="flex gap-1 flex-shrink-0">
                  <button onClick={() => setShowForm(p)} className="p-1.5 rounded-lg hover:bg-sky-50 text-slate-400">{I("pencil", { size: 13 })}</button>
                  <button onClick={() => setConfirmDelete(p.id)} className="p-1.5 rounded-lg hover:bg-sky-50 text-rose-600">{I("trash", { size: 13 })}</button>
                </div>
              </div>
              <div className="mt-3 text-xs text-slate-500 space-y-1">
                {p.phone && <div className="flex items-center gap-1">{I("phone", { size: 11 })} {p.phone}</div>}
                <div>{visitCount} visit{visitCount !== 1 ? "s" : ""} on record</div>
                {p.notes && <div className="text-slate-400 mt-1 line-clamp-2">{p.notes}</div>}
              </div>
            </div>
          );
        })}
      </div>
      {showForm && <PatientForm data={showForm} onCancel={() => setShowForm(null)} onSave={save} />}
      {confirmDelete && (
        <Sheet title="Delete patient?" onClose={() => setConfirmDelete(null)}>
          <p className="text-sm text-slate-400 mb-5">This removes the patient from the registry. Past appointments and payments already recorded under their name stay untouched.</p>
          <div className="flex gap-2">
            <button onClick={() => setConfirmDelete(null)} className="flex-1 py-2.5 rounded-xl border border-sky-200 text-sm font-medium text-slate-600">Cancel</button>
            <button onClick={() => del(confirmDelete)} className="flex-1 py-2.5 rounded-xl bg-rose-600 hover:bg-rose-500 text-white text-sm font-medium">Delete</button>
          </div>
        </Sheet>
      )}
    </div>
  );
}

function PatientForm({ data, onCancel, onSave }) {
  const [form, setForm] = useState(data);
  function set(k, v) { setForm((f) => ({ ...f, [k]: v })); }
  return (
    <Sheet title={data.id ? "Edit patient" : "Add patient"} onClose={onCancel}>
      <Field label="Full name"><input className={inputCls} value={form.name} onChange={(e) => set("name", e.target.value)} /></Field>
      <Field label="Phone"><input className={inputCls} value={form.phone} onChange={(e) => set("phone", e.target.value)} /></Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Age"><input type="number" className={inputCls} value={form.age} onChange={(e) => set("age", e.target.value)} /></Field>
        <Field label="Gender">
          <select className={inputCls} value={form.gender} onChange={(e) => set("gender", e.target.value)}>
            <option value="">—</option><option value="Female">Female</option><option value="Male">Male</option>
          </select>
        </Field>
      </div>
      <Field label="Medical notes / history"><textarea className={inputCls} rows={3} value={form.notes} onChange={(e) => set("notes", e.target.value)} /></Field>
      <button disabled={!form.name} onClick={() => onSave(form)} className={`w-full ${btnPrimary} mt-2`}>Save patient</button>
    </Sheet>
  );
}

// ---------- Calendar ----------
function CalendarTab({ doctors, appointments, availability, procedures, patients, currentUser, isAdmin, canEdit }) {
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [showApptForm, setShowApptForm] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const cells = useMemo(() => {
    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const arr = [];
    for (let i = 0; i < firstDay; i++) arr.push(null);
    for (let d = 1; d <= daysInMonth; d++) arr.push(d);
    return arr;
  }, [viewYear, viewMonth]);

  function apptsFor(dateStr) { return appointments.filter((a) => a.date === dateStr).sort((a, b) => (a.time || "").localeCompare(b.time || "")); }
  function presentDoctorsFor(dateStr) { return doctors.filter((doc) => availability.find((av) => av.date === dateStr && av.doctorId === doc.id && av.status === "present")); }

  function changeMonth(delta) {
    let m = viewMonth + delta, y = viewYear;
    if (m < 0) { m = 11; y -= 1; } else if (m > 11) { m = 0; y += 1; }
    setViewMonth(m); setViewYear(y);
  }

  async function setAvailabilityStatus(doctorId, status) {
    const existing = availability.find((av) => av.date === selectedDate && av.doctorId === doctorId);
    if (existing) await db.collection("availability").doc(existing.id).update({ status });
    else await db.collection("availability").add({ date: selectedDate, doctorId, status });
  }
  async function saveAppointment(data) {
    if (data.id) { const { id, ...rest } = data; await db.collection("appointments").doc(id).update(rest); }
    else await db.collection("appointments").add(data);
    setShowApptForm(null);
  }
  async function deleteAppointment(id) { await db.collection("appointments").doc(id).delete(); setConfirmDelete(null); }

  const dayAppts = apptsFor(selectedDate);

  return (
    <div className="grid lg:grid-cols-3 gap-5">
      <div className="lg:col-span-2 bg-white rounded-2xl border border-sky-100 p-4 sm:p-5">
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-display text-lg text-slate-800">{MONTH_NAMES[viewMonth]} {viewYear}</h2>
          <div className="flex items-center gap-1">
            <button onClick={() => { setViewMonth(today.getMonth()); setViewYear(today.getFullYear()); setSelectedDate(todayStr()); }} className="text-xs font-medium text-amber-600 px-2.5 py-1.5 rounded-lg hover:bg-amber-50 mr-1">Today</button>
            <button onClick={() => changeMonth(-1)} className="p-1.5 rounded-lg hover:bg-sky-50 text-slate-400">{I("chevLeft", { size: 18 })}</button>
            <button onClick={() => changeMonth(1)} className="p-1.5 rounded-lg hover:bg-sky-50 text-slate-400">{I("chevRight", { size: 18 })}</button>
          </div>
        </div>
        <div className="grid grid-cols-7 gap-1 mb-1">{WEEKDAY_LABELS.map((w) => <div key={w} className="text-center text-[11px] font-medium text-slate-500 py-1">{w}</div>)}</div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d, i) => {
            if (!d) return <div key={i} />;
            const dateStr = toDateStr(viewYear, viewMonth, d);
            const isSelected = dateStr === selectedDate;
            const isToday = dateStr === todayStr();
            const present = presentDoctorsFor(dateStr);
            const apptCount = appointments.filter((a) => a.date === dateStr).length;
            return (
              <button key={i} onClick={() => setSelectedDate(dateStr)}
                className={`aspect-square rounded-xl p-1.5 flex flex-col items-center justify-start border ${isSelected ? "border-amber-500 bg-amber-50" : isToday ? "border-sky-400 bg-sky-50" : "border-transparent hover:bg-sky-50"}`}>
                <span className={`text-xs font-medium ${isSelected ? "text-amber-700" : "text-slate-600"}`}>{d}</span>
                <div className="flex gap-0.5 mt-1 flex-wrap justify-center">
                  {present.slice(0, 4).map((doc) => <span key={doc.id} className={`w-1.5 h-1.5 rounded-full ${colorFor(doctors, doc.id).dot}`} />)}
                </div>
                {apptCount > 0 && <span className="text-[9px] text-slate-500 mt-0.5">{apptCount} visit{apptCount > 1 ? "s" : ""}</span>}
              </button>
            );
          })}
        </div>
        <div className="flex flex-wrap gap-3 mt-4 pt-4 border-t border-sky-100">
          {doctors.map((doc) => <div key={doc.id} className="flex items-center gap-1.5 text-xs text-slate-400"><span className={`w-2 h-2 rounded-full ${colorFor(doctors, doc.id).dot}`} /> {doc.name}</div>)}
          {doctors.length === 0 && <p className="text-xs text-slate-500">Add doctors from the Doctors tab to see them on the calendar.</p>}
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-sky-100 p-4 sm:p-5 h-fit lg:sticky lg:top-20">
        <h3 className="font-display text-base text-slate-800 mb-1">{formatLongDate(selectedDate)}</h3>
        <p className="text-xs text-slate-500 mb-4">Mark who's in today and manage visits.</p>

        <div className="mb-5">
          <div className="text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wide">Doctors today</div>
          {doctors.length === 0 && <p className="text-sm text-slate-500">No doctors added yet.</p>}
          <div className="space-y-2">
            {doctors.map((doc) => {
              const rec = availability.find((av) => av.date === selectedDate && av.doctorId === doc.id);
              const status = rec?.status || "unset";
              const editable = canEdit(doc.id);
              return (
                <div key={doc.id} className="flex items-center justify-between gap-2">
                  <div className="flex items-center gap-2 min-w-0"><span className={`w-2 h-2 rounded-full flex-shrink-0 ${colorFor(doctors, doc.id).dot}`} /><span className="text-sm text-slate-700 truncate">{doc.name}</span></div>
                  <div className="flex gap-1 flex-shrink-0">
                    <button disabled={!editable} onClick={() => setAvailabilityStatus(doc.id, "present")} className={`text-[11px] px-2 py-1 rounded-md font-medium border ${status === "present" ? "bg-emerald-500 text-white border-emerald-500" : "border-sky-200 text-slate-500"} ${!editable ? "opacity-50" : "hover:border-emerald-400"}`}>In</button>
                    <button disabled={!editable} onClick={() => setAvailabilityStatus(doc.id, "off")} className={`text-[11px] px-2 py-1 rounded-md font-medium border ${status === "off" ? "bg-rose-500 text-white border-rose-500" : "border-sky-200 text-slate-500"} ${!editable ? "opacity-50" : "hover:border-rose-400"}`}>Off</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide">Appointments</div>
            <button onClick={() => setShowApptForm({ date: selectedDate, doctorId: isAdmin ? "" : currentUser.doctorId, time: "", patientName: "", phone: "", status: "scheduled", specialty: "", procedureId: "", notes: "" })} className="flex items-center gap-1 text-xs font-medium text-amber-600 hover:bg-amber-50 px-2 py-1 rounded-lg">{I("plus", { size: 14 })} Add</button>
          </div>
          {dayAppts.length === 0 && <p className="text-sm text-slate-500">No appointments for this day yet.</p>}
          <div className="space-y-2">
            {dayAppts.map((a) => {
              const doc = doctors.find((d) => d.id === a.doctorId);
              const proc = procedures.find((p) => p.id === a.procedureId);
              const c = colorFor(doctors, a.doctorId);
              const editable = canEdit(a.doctorId);
              const statusPill = { scheduled: "bg-sky-50 text-sky-700", done: "bg-emerald-50 text-emerald-700", cancelled: "bg-rose-50 text-rose-700" }[a.status] || "bg-sky-50 text-slate-400";
              return (
                <div key={a.id} className={`border rounded-xl p-3 ${c.chip}`}>
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0">
                      <div className="flex items-center gap-1.5 text-xs text-slate-400 mb-0.5">{I("clock", { size: 12 })} {a.time || "—"} <span className={`px-1.5 py-0.5 rounded-full ${statusPill} ml-1`}>{a.status}</span></div>
                      <div className="text-sm font-medium text-slate-800 truncate">{a.patientName}</div>
                      <div className="text-xs text-slate-400 flex items-center gap-1">{a.phone && <>{I("phone", { size: 11 })} {a.phone}</>}</div>
                      <div className={`text-[11px] mt-1 inline-block px-1.5 py-0.5 rounded-full border ${c.chip}`}>{doc ? doc.name : "Unknown doctor"}</div>
                      {proc && <div className="text-[11px] mt-1 ml-1 inline-block px-1.5 py-0.5 rounded-full border border-amber-200 bg-amber-50 text-amber-700">{proc.specialty} · {proc.name}</div>}
                      {a.notes && <div className="text-xs text-slate-400 mt-1">{a.notes}</div>}
                    </div>
                    {editable && (
                      <div className="flex flex-col gap-1 flex-shrink-0">
                        <button onClick={() => setShowApptForm(a)} className="p-1.5 rounded-lg hover:bg-white/60 text-slate-400">{I("pencil", { size: 14 })}</button>
                        <button onClick={() => setConfirmDelete(a.id)} className="p-1.5 rounded-lg hover:bg-white/60 text-rose-600">{I("trash", { size: 14 })}</button>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {showApptForm && <AppointmentForm doctors={doctors} procedures={procedures} patients={patients} data={showApptForm} isAdmin={isAdmin} currentUser={currentUser} onCancel={() => setShowApptForm(null)} onSave={saveAppointment} />}
      {confirmDelete && (
        <Sheet title="Delete appointment?" onClose={() => setConfirmDelete(null)}>
          <p className="text-sm text-slate-400 mb-5">This will permanently remove the appointment record.</p>
          <div className="flex gap-2">
            <button onClick={() => setConfirmDelete(null)} className="flex-1 py-2.5 rounded-xl border border-sky-200 text-sm font-medium text-slate-600">Cancel</button>
            <button onClick={() => deleteAppointment(confirmDelete)} className="flex-1 py-2.5 rounded-xl bg-rose-600 hover:bg-rose-500 text-white text-sm font-medium">Delete</button>
          </div>
        </Sheet>
      )}
    </div>
  );
}

function AppointmentForm({ doctors, procedures, patients, data, isAdmin, currentUser, onCancel, onSave }) {
  const [form, setForm] = useState({ specialty: "", procedureId: "", ...data });
  function set(k, v) { setForm((f) => ({ ...f, [k]: v })); }
  const specialties = useMemo(() => [...new Set(procedures.map((p) => p.specialty))], [procedures]);
  const filteredProcedures = procedures.filter((p) => !form.specialty || p.specialty === form.specialty);
  return (
    <Sheet title={data.id ? "Edit appointment" : "New appointment"} onClose={onCancel}>
      <Field label="Doctor">
        {isAdmin ? (
          <select className={inputCls} value={form.doctorId} onChange={(e) => set("doctorId", e.target.value)}>
            <option value="">Select doctor…</option>
            {doctors.map((d) => <option key={d.id} value={d.id}>{d.name}</option>)}
          </select>
        ) : <div className="text-sm text-slate-600 py-2">{doctors.find((d) => d.id === currentUser.doctorId)?.name || "You"}</div>}
      </Field>
      <Field label="Time"><input type="time" className={inputCls} value={form.time} onChange={(e) => set("time", e.target.value)} /></Field>
      <Field label="Patient name">
        <input list="patient-names" className={inputCls} value={form.patientName} onChange={(e) => set("patientName", e.target.value)} />
        <datalist id="patient-names">{patients.map((p) => <option key={p.id} value={p.name} />)}</datalist>
      </Field>
      <Field label="Phone"><input className={inputCls} value={form.phone} onChange={(e) => set("phone", e.target.value)} /></Field>
      <Field label="Specialty">
        <select className={inputCls} value={form.specialty} onChange={(e) => { set("specialty", e.target.value); set("procedureId", ""); }}>
          <option value="">Select specialty…</option>
          {specialties.map((s) => <option key={s} value={s}>{s}</option>)}
        </select>
      </Field>
      <Field label="Procedure">
        <select className={inputCls} value={form.procedureId} onChange={(e) => set("procedureId", e.target.value)} disabled={!form.specialty}>
          <option value="">{form.specialty ? "Select procedure…" : "Select a specialty first"}</option>
          {filteredProcedures.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </Field>
      <Field label="Status">
        <select className={inputCls} value={form.status} onChange={(e) => set("status", e.target.value)}>
          <option value="scheduled">Scheduled</option><option value="done">Done</option><option value="cancelled">Cancelled</option>
        </select>
      </Field>
      <Field label="Notes"><textarea className={inputCls} rows={2} value={form.notes} onChange={(e) => set("notes", e.target.value)} /></Field>
      <button disabled={!form.doctorId || !form.patientName} onClick={() => onSave(form)} className={`w-full ${btnPrimary} mt-2`}>Save appointment</button>
    </Sheet>
  );
}

// ---------- Procedures catalog ----------
function ProceduresTab({ procedures, isAdmin }) {
  const [showForm, setShowForm] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const specialties = useMemo(() => [...new Set(procedures.map((p) => p.specialty))].sort(), [procedures]);

  async function save(form) {
    if (form.id) { const { id, ...rest } = form; await db.collection("procedures").doc(id).update(rest); }
    else await db.collection("procedures").add({ specialty: form.specialty, name: form.name });
    setShowForm(null);
  }
  async function del(id) { await db.collection("procedures").doc(id).delete(); setConfirmDelete(null); }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="font-display text-lg text-slate-800">Dental procedures</h2>
          <p className="text-xs text-slate-500">Catalog of procedures by specialty, used when logging an appointment.</p>
        </div>
        {isAdmin && <button onClick={() => setShowForm({ specialty: "", name: "" })} className="flex items-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-black text-sm font-semibold px-3.5 py-2 rounded-xl">{I("plus", { size: 16 })} Add</button>}
      </div>
      {procedures.length === 0 && <div className="bg-white rounded-2xl border border-sky-100 p-8 text-center text-slate-500 text-sm">No procedures in the catalog yet.</div>}
      <div className="space-y-5">
        {specialties.map((spec) => (
          <div key={spec} className="bg-white rounded-2xl border border-sky-100 overflow-hidden">
            <div className="px-4 py-2.5 bg-amber-50 border-b border-sky-100 text-amber-700 text-sm font-semibold">{spec}</div>
            <div className="divide-y divide-sky-100">
              {procedures.filter((p) => p.specialty === spec).map((p) => (
                <div key={p.id} className="flex items-center justify-between px-4 py-2.5">

// ---------- Doctors ----------
function DoctorsTab({ doctors, users, isAdmin }) {
  const [showForm, setShowForm] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [busy, setBusy] = useState(false);
  const [formError, setFormError] = useState("");

  async function saveDoctor(form) {
    setFormError(""); setBusy(true);
    try {
      if (form.id) {
        await db.collection("doctors").doc(form.id).update({ name: form.name, specialty: form.specialty, phone: form.phone });
        const u = users.find((x) => x.doctorId === form.id);
        if (u) await db.collection("users").doc(u.id).update({ name: form.name });
      } else {
        const docRef = await db.collection("doctors").add({ name: form.name, specialty: form.specialty, phone: form.phone });
        const secondaryApp = firebase.initializeApp(firebaseConfig, "Secondary" + Date.now());
        try {
          const cred = await secondaryApp.auth().createUserWithEmailAndPassword(form.email.trim(), form.password);
          const uid = cred.user.uid;
          await secondaryApp.auth().signOut();
          await db.collection("users").doc(uid).set({ role: "doctor", doctorId: docRef.id, name: form.name, email: form.email.trim() });
        } finally {
          await secondaryApp.delete();
        }
      }
      setShowForm(null);
    } catch (e) {
      setFormError(e.message || "Could not save doctor.");
    }
    setBusy(false);
  }
  async function deleteDoctor(id) {
    await db.collection("doctors").doc(id).delete();
    const u = users.find((x) => x.doctorId === id);
    if (u) await db.collection("users").doc(u.id).delete();
    setConfirmDelete(null);
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-display text-lg text-slate-800">Doctors</h2>
        {isAdmin && <button onClick={() => setShowForm({})} className="flex items-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-black text-sm font-semibold px-3.5 py-2 rounded-xl">{I("plus", { size: 16 })} Add doctor</button>}
      </div>
      {doctors.length === 0 && <div className="bg-white rounded-2xl border border-sky-100 p-8 text-center text-slate-500 text-sm">No doctors yet. {isAdmin ? "Add your first doctor to get started." : "Ask the administrator to add doctors."}</div>}
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        {doctors.map((d) => {
          const c = colorFor(doctors, d.id);
          const u = users.find((x) => x.doctorId === d.id);
          return (
            <div key={d.id} className="bg-white rounded-2xl border border-sky-100 p-4">
              <div className="flex items-start justify-between">
                <div className="flex items-center gap-2.5">
                  <span className={`w-9 h-9 rounded-full flex items-center justify-center text-black text-sm font-semibold ${c.dot}`}>{d.name?.[0]?.toUpperCase() || "?"}</span>
                  <div><div className="text-sm font-semibold text-slate-800">{d.name}</div><div className="text-xs text-slate-500">{d.specialty || "General"}</div></div>
                </div>
                {isAdmin && (
                  <div className="flex gap-1">
                    <button onClick={() => setShowForm({ ...d })} className="p-1.5 rounded-lg hover:bg-sky-50 text-slate-400">{I("pencil", { size: 14 })}</button>
                    <button onClick={() => setConfirmDelete(d.id)} className="p-1.5 rounded-lg hover:bg-sky-50 text-rose-600">{I("trash", { size: 14 })}</button>
                  </div>
                )}
              </div>
              <div className="mt-3 text-xs text-slate-500 space-y-0.5">
                {d.phone && <div>{d.phone}</div>}
                {u && isAdmin && <div className="text-slate-600">Login: {u.email}</div>}
              </div>
            </div>
          );
        })}
      </div>
      {showForm && <DoctorForm data={showForm} busy={busy} error={formError} onCancel={() => setShowForm(null)} onSave={saveDoctor} />}
      {confirmDelete && (
        <Sheet title="Remove doctor?" onClose={() => setConfirmDelete(null)}>
          <p className="text-sm text-slate-400 mb-5">This removes the doctor record and their login profile. Their existing appointments and payments remain on record. (Their sign-in account itself must also be deleted from the Firebase console under Authentication.)</p>
          <div className="flex gap-2">
            <button onClick={() => setConfirmDelete(null)} className="flex-1 py-2.5 rounded-xl border border-sky-200 text-sm font-medium text-slate-600">Cancel</button>
            <button onClick={() => deleteDoctor(confirmDelete)} className="flex-1 py-2.5 rounded-xl bg-rose-600 hover:bg-rose-500 text-white text-sm font-medium">Remove</button>
          </div>
        </Sheet>
      )}
    </div>
  );
}

// ---------- Payments ----------
function PaymentsTab({ doctors, payments, patients, currentUser, isAdmin, canEdit }) {
  const now = new Date();

  const [month, setMonth] = useState(now.getMonth());

    if (!p.date.startsWith(ym)) return false;

    if (isAdmin && doctorFilter !== "all" && p.doctorId !== doctorFilter) return false;

        <div className="divide-y divide-sky-100">
          {visible.map((p) => {
            const doc = doctors.find((d) => d.id === p.doctorId);

              <div key={p.id} className="flex items-center justify-between px-4 py-3 gap-2">

// ---------- Reports ----------
function ReportsTab({ doctors, appointments, payments, procedures, currentUser, isAdmin }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const ym = `${year}-${pad(month + 1)}`;

  function statsFor(doctorId) {
    const apps = appointments.filter((a) => a.date.startsWith(ym) && a.doctorId === doctorId);
    const pays = payments.filter((p) => p.date.startsWith(ym) && p.doctorId === doctorId);
    return { totalVisits: apps.length, completedVisits: apps.filter((a) => a.status === "done").length, totalPayments: pays.reduce((s, p) => s + Number(p.amount || 0), 0) };
  }
  const monthAppts = appointments.filter((a) => a.date.startsWith(ym) && a.status === "done" && a.procedureId);
  const procedureCounts = useMemo(() => {
    const map = {};
    monthAppts.forEach((a) => {
      const proc = procedures.find((p) => p.id === a.procedureId);
      if (!proc) return;
      const key = `${proc.specialty} · ${proc.name}`;
      map[key] = (map[key] || 0) + 1;
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [monthAppts, procedures]);

  function downloadCsv() {
    const rows = [["Doctor", "Total Visits", "Completed Visits", "Total Payments (EGP)"]];
    let gv = 0, gc = 0, gt = 0;
    doctors.forEach((d) => { const s = statsFor(d.id); rows.push([d.name, s.totalVisits, s.completedVisits, s.totalPayments]); gv += s.totalVisits; gc += s.completedVisits; gt += s.totalPayments; });
    rows.push(["TOTAL", gv, gc, gt]);
    const csv = rows.map((r) => r.join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `al-galaa-clinic-report-${ym}.csv`; a.click(); URL.revokeObjectURL(url);
  }

  return (
    <div>
      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <h2 className="font-display text-lg text-slate-800">Monthly report</h2>
        <div className="flex gap-2">
          <select className="rounded-xl border border-sky-200 bg-sky-50 text-slate-800 px-3 py-2 text-sm" value={month} onChange={(e) => setMonth(Number(e.target.value))}>{MONTH_NAMES.map((m, i) => <option key={m} value={i}>{m}</option>)}</select>
          <select className="rounded-xl border border-sky-200 bg-sky-50 text-slate-800 px-3 py-2 text-sm" value={year} onChange={(e) => setYear(Number(e.target.value))}>{[year - 1, year, year + 1].map((y) => <option key={y} value={y}>{y}</option>)}</select>
          {isAdmin && <button onClick={downloadCsv} className="flex items-center gap-1.5 border border-amber-200 text-amber-600 text-sm font-medium px-3 py-2 rounded-xl hover:bg-amber-50">{I("download", { size: 15 })} CSV</button>}
        </div>
      </div>
      {isAdmin ? (
        <div className="bg-white rounded-2xl border border-sky-100 overflow-hidden mb-5">
          <table className="w-full text-sm">
            <thead><tr className="bg-sky-50/50 text-slate-400 text-xs uppercase tracking-wide"><th className="text-left font-semibold px-4 py-3">Doctor</th><th className="text-right font-semibold px-4 py-3">Visits</th><th className="text-right font-semibold px-4 py-3">Completed</th><th className="text-right font-semibold px-4 py-3">Payments</th></tr></thead>
            <tbody className="divide-y divide-sky-100">
              {doctors.map((d) => { const s = statsFor(d.id); return (
                <tr key={d.id}>
                  <td className="px-4 py-3 flex items-center gap-2 text-slate-700"><span className={`w-2 h-2 rounded-full ${colorFor(doctors, d.id).dot}`} /> {d.name}</td>
                  <td className="px-4 py-3 text-right text-slate-600">{s.totalVisits}</td>
                  <td className="px-4 py-3 text-right text-slate-600">{s.completedVisits}</td>
                  <td className="px-4 py-3 text-right font-medium text-amber-700">{money(s.totalPayments)}</td>
                </tr>
              );})}
              {doctors.length === 0 && <tr><td colSpan={4} className="px-4 py-6 text-center text-slate-500">No doctors yet.</td></tr>}
            </tbody>
            {doctors.length > 0 && (
              <tfoot><tr className="bg-amber-50 font-semibold text-amber-700">
                <td className="px-4 py-3">Clinic total</td>
                <td className="px-4 py-3 text-right">{doctors.reduce((s, d) => s + statsFor(d.id).totalVisits, 0)}</td>
                <td className="px-4 py-3 text-right">{doctors.reduce((s, d) => s + statsFor(d.id).completedVisits, 0)}</td>
                <td className="px-4 py-3 text-right">{money(doctors.reduce((s, d) => s + statsFor(d.id).totalPayments, 0))}</td>
              </tr></tfoot>
            )}
          </table>
        </div>
      ) : (
        <div className="grid sm:grid-cols-3 gap-3 mb-5">
          {(() => { const s = statsFor(currentUser.doctorId); return (<>
            <StatCard label="Total visits" value={s.totalVisits} />
            <StatCard label="Completed patients" value={s.completedVisits} />
            <StatCard label="Total payments" value={money(s.totalPayments)} />
          </>); })()}
        </div>
      )}

      <div className="bg-white rounded-2xl border border-sky-100 overflow-hidden">
        <div className="px-4 py-3 bg-sky-50/50 border-b border-sky-100 text-sm font-semibold text-slate-600">Procedures performed this month</div>
        {procedureCounts.length === 0 && <div className="p-6 text-center text-sm text-slate-500">No completed procedures recorded yet for this month.</div>}
        <div className="divide-y divide-sky-100">
          {procedureCounts.map(([label, count]) => (
            <div key={label} className="flex items-center justify-between px-4 py-2.5">
              <span className="text-sm text-slate-700">{label}</span>
              <span className="text-sm font-semibold text-amber-700">{count}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
function StatCard({ label, value }) {
  return <div className="bg-white rounded-2xl border border-sky-100 p-5"><div className="text-xs text-slate-500 mb-1">{label}</div><div className="font-display text-2xl text-slate-800">{value}</div></div>;
}

// ---------- Account ----------
function AccountTab({ currentUser }) {
  const [current, setCurrent] = useState("");
  const [next, setNext] = useState("");
  const [msg, setMsg] = useState("");
  const [error, setError] = useState("");

  async function changePassword() {
    setMsg(""); setError("");
    if (!next || next.length < 6) { setError("New password must be at least 6 characters."); return; }
    try {
      const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, current);
      await auth.currentUser.reauthenticateWithCredential(cred);
      await auth.currentUser.updatePassword(next);
      setCurrent(""); setNext(""); setMsg("Password updated.");
    } catch (e) {
      setError("Current password is incorrect, or the update failed. Try again.");
    }
  }

  return (
    <div className="max-w-md">
      <h2 className="font-display text-lg text-slate-800 mb-4">Account</h2>
      <div className="bg-white rounded-2xl border border-sky-100 p-5 mb-4">
        <div className="flex items-center gap-3">
          <span className="w-10 h-10 rounded-full bg-amber-500 text-black flex items-center justify-center font-semibold">{currentUser.name?.[0] || "U"}</span>
          <div><div className="text-sm font-semibold text-slate-800">{currentUser.name}</div><div className="text-xs text-slate-500 flex items-center gap-1">{currentUser.role === "admin" && I("shield", { size: 12 })} {currentUser.role === "admin" ? "Administrator" : "Doctor"} · {currentUser.email}</div></div>
        </div>
      </div>
      <div className="bg-white rounded-2xl border border-sky-100 p-5">
        <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3 flex items-center gap-1.5">{I("lock", { size: 13 })} Change password</div>
        <Field label="Current password"><input type="password" className={inputCls} value={current} onChange={(e) => setCurrent(e.target.value)} /></Field>
        <Field label="New password"><input type="password" className={inputCls} value={next} onChange={(e) => setNext(e.target.value)} /></Field>
        {error && <p className="text-xs text-rose-600 mb-3">{error}</p>}
        {msg && <p className="text-xs text-emerald-600 mb-3">{msg}</p>}
        <button onClick={changePassword} className={`w-full ${btnPrimary}`}>Update password</button>
      </div>
      <button onClick={() => auth.signOut()} className="w-full flex items-center justify-center gap-2 text-rose-600 font-medium text-sm mt-4 py-2.5">{I("logout", { size: 16 })} Sign out</button>
    </div>
  );
}

// ---------- Search ----------
function PatientSearch({ doctors, appointments, payments, currentUser, isAdmin, onClose }) {
  const [q, setQ] = useState("");
  const query = q.trim().toLowerCase();
  const apptResults = query.length < 2 ? [] : appointments.filter((a) => a.patientName?.toLowerCase().includes(query) && (isAdmin || a.doctorId === currentUser.doctorId));
  const payResults = query.length < 2 ? [] : payments.filter((p) => p.patientName?.toLowerCase().includes(query) && (isAdmin || p.doctorId === currentUser.doctorId));
  return (
    <Sheet title="Find patient" onClose={onClose} wide>
      <div className="relative mb-4">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">{I("search", { size: 16 })}</span>
        <input autoFocus className={`${inputCls} pl-9`} placeholder="Type a patient name…" value={q} onChange={(e) => setQ(e.target.value)} />
      </div>
      {query.length >= 2 && apptResults.length === 0 && payResults.length === 0 && <p className="text-sm text-slate-500 text-center py-4">No matching records found.</p>}
      {apptResults.length > 0 && (
        <div className="mb-4">
          <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Appointments</div>
          <div className="space-y-1.5">{apptResults.map((a) => { const doc = doctors.find((d) => d.id === a.doctorId); return (
            <div key={a.id} className="text-sm border border-sky-100 rounded-lg px-3 py-2 flex justify-between text-slate-700"><span>{a.patientName} <span className="text-slate-500">· {doc?.name || "—"}</span></span><span className="text-slate-500">{a.date}</span></div>
          );})}</div>
        </div>
      )}
      {payResults.length > 0 && (
        <div>
          <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Payments</div>
          <div className="space-y-1.5">{payResults.map((p) => { const doc = doctors.find((d) => d.id === p.doctorId); return (
            <div key={p.id} className="text-sm border border-sky-100 rounded-lg px-3 py-2 flex justify-between text-slate-700"><span>{p.patientName} <span className="text-slate-500">· {doc?.name || "—"}</span></span><span className="font-medium text-amber-700">{money(p.amount)}</span></div>
          );})}</div>
        </div>
      )}
    </Sheet>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
